name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build src/PlatformControlPlane.Api/PlatformControlPlane.Api.csproj --configuration Release
      - run: dotnet run --project tests/PlatformControlPlane.Tests/PlatformControlPlane.Tests.csproj --configuration Release

